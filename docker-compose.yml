services:
  mongodb:
    container_name: mongo
    image: mongo:7.0
    # Apple Silicon (M1/M2): run the native arm64 build. The amd64 image under
    # emulation lacks AVX, which MongoDB 5.0+ requires, so it exits immediately.
    platform: linux/arm64
    networks:
      - app-net
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    container_name: redis
    image: redis:latest
    networks:
      - app-net
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: backend
    build: ./backend
    networks:
      - app-net
    env_file:
      # Single source of truth for backend config (PORT, Mongo/Redis URIs, CORS).
      - ./backend/.env.sample
    ports:
      - "5000:5000"
    volumes:
      - logs:/app/logs
      - ./backend:/app
      - /app/node_modules
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    container_name: frontend
    build: ./frontend
    networks:
      - app-net
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    env_file:
      # Single source of truth for the frontend's API base URL.
      - ./frontend/.env.sample
    stdin_open: true
    tty: true
    depends_on:
      - backend

networks:
  app-net:
    driver: bridge

volumes:
  logs:
  mongo-data:
