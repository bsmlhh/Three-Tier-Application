services:
  mongodb:
    container_name: mongo
    image: mongo:latest
    networks:
      - app-net
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    container_name: redis
    image: redis:latest
    networks:
      - app-net
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: backend
    build: ./backend
    networks:
      - app-net
    env_file:
      - ./backend/.env.sample
    environment:
      # Override values from .env.sample so the backend reaches the
      # DB/cache containers by their service name instead of 127.0.0.1,
      # and listens on the port compose actually publishes.
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/wanderlust
      - REDIS_URL=redis://redis:6379
    ports:
      - "5000:5000"
    volumes:
      - logs:/app/logs
      - ./backend:/app
      - /app/node_modules
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    container_name: frontend
    build: ./frontend
    networks:
      - app-net
    ports:
      - "5173:5173"
    environment:
      # Point the browser at the locally running backend container.
      # No trailing slash: some components concatenate `VITE_API_PATH + '/api/...'`,
      # and a trailing slash there produces a broken `//api/...` URL.
      - VITE_API_PATH=http://localhost:5000
    volumes:
      - ./frontend/src:/app/src
    env_file:
      - ./frontend/.env.sample
    stdin_open: true
    tty: true
    depends_on:
      - backend

networks:
  app-net:
    driver: bridge

volumes:
  logs:
  mongo-data:
